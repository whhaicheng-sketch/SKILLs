name: Unpack MySQL BUG Analysis Skill

on:
  push:
    branches: [main]
    paths:
      - '.bootstrap/**'
      - '.github/workflows/unpack-mysql-bug-analysis.yml'
  pull_request:
    branches: [main]
    paths:
      - '.bootstrap/**'
      - '.github/workflows/unpack-mysql-bug-analysis.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Reconstruct, validate, and unpack skill
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/part-*.b64 | base64 --decode > /tmp/mysql-bug-analysis.zip
          echo '43480f3a326c053d893163712c35c01a582b0a8370b92301b2150fb9a32dbc7f  /tmp/mysql-bug-analysis.zip' | sha256sum -c -
          rm -rf mysql-bug-analysis
          unzip -q /tmp/mysql-bug-analysis.zip
          test -f mysql-bug-analysis/SKILL.md
          python3 -m pip install --disable-pip-version-check -r mysql-bug-analysis/requirements.txt
          python3 mysql-bug-analysis/scripts/self_check.py
          PYTHONPATH=mysql-bug-analysis/scripts python3 -m unittest discover -s mysql-bug-analysis/tests -v

      - name: Commit complete skill and remove bootstrap files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap
          rm -f .github/workflows/unpack-mysql-bug-analysis.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi
          git commit -m 'feat: add complete mysql bug analysis Codex skill'
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
