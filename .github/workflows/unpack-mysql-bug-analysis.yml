name: Unpack MySQL BUG Analysis Skill

on:
  push:
    branches:
      - agent/upload-complete-mysql-bug-skill
    paths:
      - '.bootstrap/**'
      - '.github/workflows/unpack-mysql-bug-analysis.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/upload-complete-mysql-bug-skill

      - name: Reconstruct and unpack complete skill
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          import zipfile

          parts = sorted(Path('.bootstrap').glob('part-*.b64'))
          if not parts:
              raise SystemExit('No archive parts found')

          encoded = ''.join(part.read_text(encoding='utf-8') for part in parts)
          encoded = ''.join(encoded.split())
          archive = base64.b64decode(encoded)
          digest = hashlib.sha256(archive).hexdigest()
          print(f'archive_sha256={digest}')
          if digest != '43480f3a326c053d893163712c35c01a582b0a8370b92301b2150fb9a32dbc7f':
              raise SystemExit(f'Archive SHA-256 mismatch: {digest}')

          zip_path = Path('/tmp/mysql-bug-analysis.zip')
          zip_path.write_bytes(archive)
          with zipfile.ZipFile(zip_path) as bundle:
              broken = bundle.testzip()
              if broken:
                  raise SystemExit(f'Corrupt ZIP member: {broken}')
              bundle.extractall('.')
          PY
          test -f mysql-bug-analysis/SKILL.md

      - name: Commit complete skill and clean temporary files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap
          rm -f .github/workflows/unpack-mysql-bug-analysis.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add complete mysql bug analysis Codex skill'
          git push origin HEAD:agent/upload-complete-mysql-bug-skill
