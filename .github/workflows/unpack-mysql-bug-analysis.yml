name: Finalize MySQL BUG Analysis Skill

on:
  pull_request:
    branches: [main]
    paths:
      - '.bootstrap/**'
      - '.github/workflows/unpack-mysql-bug-analysis.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finalize-mysql-bug-skill

      - name: Reconstruct and unpack complete skill
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import zipfile

          parts = sorted(Path('.bootstrap').glob('part-*.b64'))
          if not parts:
              raise SystemExit('No archive parts found')
          encoded = ''.join(part.read_text(encoding='utf-8') for part in parts)
          encoded = ''.join(encoded.split())
          archive = base64.b64decode(encoded, validate=False)
          zip_path = Path('/tmp/mysql-bug-analysis.zip')
          zip_path.write_bytes(archive)
          with zipfile.ZipFile(zip_path) as bundle:
              broken = bundle.testzip()
              if broken:
                  raise SystemExit(f'Corrupt ZIP member: {broken}')
              bundle.extractall('.')
          PY
          test -f mysql-bug-analysis/SKILL.md
          test -f mysql-bug-analysis/scripts/mysql_bug.py
          test -d mysql-bug-analysis/tests

      - name: Commit complete skill and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap
          rm -f .github/workflows/unpack-mysql-bug-analysis.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add complete mysql bug analysis Codex skill'
          git push origin HEAD:agent/finalize-mysql-bug-skill
